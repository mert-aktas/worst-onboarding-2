<!DOCTYPE html><html><head><meta charset="utf-8"><style>
  body{margin:0}
  .card{width:1200px;height:630px;background:#0a0a0c;position:relative;overflow:hidden;
        font-family:Georgia,serif;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .glow{position:absolute;top:-100px;left:300px;width:600px;height:500px;
        background:radial-gradient(circle,rgba(77,255,145,.08),transparent 70%)}
  h1{color:#e8e6e3;font-size:88px;font-weight:700;margin:0;z-index:1}
  h1 em{color:#ff4d4d;font-style:italic}
  p{color:#6b6976;font-size:26px;font-family:system-ui,sans-serif;margin:18px 0 0;z-index:1}
  .bar{position:absolute;bottom:0;left:0;right:0;height:6px;background:#ff4d4d}
</style></head><body>
  <div class="card"><div class="glow"></div>
    <h1>Worst Onboarding <em>Ever 2</em></h1>
    <p>Five new levels. Designed by the community. Suffered by you.</p>
    <div class="bar"></div>
  </div>
</body></html>
